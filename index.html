<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de Seguridad — Integer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0E1A;
  --bg2:#0D1220;
  --card:#111827;
  --card2:#131A2E;
  --orange:#FF6B2B;
  --cyan:#00D4FF;
  --green:#00C878;
  --yellow:#FFA01E;
  --red:#FF5050;
  --text:#F0F4FF;
  --muted:#7A90B5;
  --dim:#4E6080;
  --border:rgba(255,255,255,.07);
  --font:-apple-system,'Segoe UI',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px}
.app{width:100%;max-width:860px}

/* ── SHARED ── */
.screen{animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:40px}
.logo-box{width:34px;height:34px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;flex-shrink:0}
.logo-name{font-size:19px;font-weight:700;color:var(--text)}
.eyebrow{display:inline-block;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);background:rgba(255,107,43,.1);border:1px solid rgba(255,107,43,.22);padding:4px 12px;border-radius:20px;margin-bottom:18px}
.btn{background:var(--orange);color:#fff;border:none;padding:13px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s;font-family:var(--font)}
.btn:hover{background:#e85e22}
.btn:active{transform:scale(.98)}
.btn-full{width:100%}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.1);padding:10px 18px;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;font-family:var(--font)}
.btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,.25)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.cardtitle{font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--dim);margin-bottom:14px}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:20px}

/* ── INTRO ── */
#intro-screen{max-width:560px;margin:0 auto;padding-top:20px}
.h1{font-size:36px;font-weight:700;letter-spacing:-.8px;line-height:1.15;margin-bottom:14px}
.h1 b{color:var(--orange)}
.sub{font-size:14px;color:var(--muted);line-height:1.65;margin-bottom:36px;max-width:440px}
.meta-row{display:flex;align-items:center;gap:14px;margin-top:32px;font-size:12px;color:var(--dim)}
.meta-dot{width:3px;height:3px;border-radius:50%;background:#2A3550}

/* ── PROFILE ── */
#profile-screen{max-width:560px;margin:0 auto;padding-top:20px}
.slabel{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:14px}
.pcol{display:flex;flex-direction:column;gap:9px;margin-bottom:24px}
.pcard{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;cursor:pointer;transition:border-color .18s,background .18s,transform .1s;display:flex;align-items:center;gap:14px}
.pcard:hover{border-color:rgba(255,107,43,.5);background:rgba(255,107,43,.06)}
.pcard:active{transform:scale(.99)}
.picon{width:38px;height:38px;border-radius:9px;background:rgba(255,107,43,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pinfo{flex:1;min-width:0}
.plabel{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.pdesc{font-size:11px;color:var(--dim)}
.parrow{color:var(--dim);font-size:16px}

/* ── QUIZ ── */
#quiz-screen{max-width:640px;margin:0 auto;padding-top:20px}
.quiz-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.prog-wrap{width:100%;height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:24px;overflow:hidden}
.prog-fill{height:100%;background:var(--orange);border-radius:2px;transition:width .4s ease}
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cat-badge{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--cyan);background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.18);padding:3px 10px;border-radius:10px}
.qctr{font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums}
.qtext{font-size:20px;font-weight:600;line-height:1.35;color:var(--text);margin-bottom:24px}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:24px}
.opt{background:var(--card2);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px 18px;cursor:pointer;font-size:13px;color:var(--muted);line-height:1.4;text-align:left;transition:border-color .15s,background .15s,color .15s,transform .1s;width:100%;font-family:var(--font)}
.opt:hover{border-color:rgba(255,107,43,.5);background:rgba(255,107,43,.07);color:var(--text)}
.opt:active{transform:scale(.99)}
.qnav{display:flex;align-items:center;gap:10px}

/* ── DASHBOARD ── */
#dash-screen{padding-top:10px}
.db-hdr{display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.db-logo{width:30px;height:30px;background:var(--orange);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
.db-logoname{font-size:17px;font-weight:700}
.db-sep{width:1px;height:20px;background:rgba(255,255,255,.1)}
.db-company{font-size:13px;color:var(--muted)}
.db-company b{color:var(--text);font-weight:600}
.db-spacer{flex:1}
.db-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.db-grid{grid-template-columns:1fr}}
.db-full{grid-column:1/-1}

.brow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bname{font-size:11px;color:var(--muted);min-width:120px}
.bwrap{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px;transition:width 1s ease}
.bpct{font-size:11px;color:var(--text);min-width:32px;text-align:right;font-variant-numeric:tabular-nums}
.threat-item{border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:10px}
.threat-item:last-child{margin-bottom:0}
.threat-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.threat-rank{width:22px;height:22px;border-radius:5px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.threat-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.threat-score{font-size:12px;font-weight:700}
.threat-desc{font-size:11px;color:var(--muted);line-height:1.55;margin-left:30px}
.heat-hdr{display:grid;grid-template-columns:110px repeat(3,1fr);gap:6px;margin-bottom:6px}
.heat-hdr-lbl{font-size:10px;color:var(--dim);text-align:center;font-weight:600}
.heat-row{display:grid;grid-template-columns:110px repeat(3,1fr);gap:6px;align-items:center;margin-bottom:6px}
.heat-cat{font-size:11px;color:var(--muted)}
.heat-cell{border-radius:6px;padding:6px 4px;text-align:center;font-size:11px;font-weight:700}
.bmark-legend{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.bmark-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim)}
.bmark-dot{width:8px;height:8px;border-radius:2px}
.bmark-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bmark-lbl{font-size:11px;color:var(--muted);min-width:106px}
.bmark-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;position:relative}
.bmark-fill{height:100%;border-radius:3px}
.bmark-marker{position:absolute;top:-4px;width:2px;height:14px;border-radius:1px}
.bmark-vals{display:flex;align-items:center;gap:5px}
.bmark-val{font-size:11px;font-weight:700;min-width:30px;text-align:right}
.road-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
@media(max-width:600px){.road-steps{grid-template-columns:1fr}}
.road-step{border:1px solid var(--border);border-radius:10px;padding:14px}
.road-phase{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.road-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.3}
.road-desc{font-size:11px;color:var(--muted);line-height:1.55}
.road-cta{background:var(--card2);border:1px solid rgba(255,107,43,.22);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.road-cta-text{flex:1;min-width:200px}
.road-cta-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.road-cta-sub{font-size:11px;color:var(--muted);line-height:1.55}
.restart-row{text-align:center;margin-top:18px}
#form-screen{max-width:500px;margin:0 auto;padding-top:20px}
.form-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:8px}
.form-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
.form-input{width:100%;background:#131A2E;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .18s}
.form-input::placeholder{color:#2E3F5C}
.form-input:focus{border-color:rgba(255,107,43,.55);box-shadow:0 0 0 3px rgba(255,107,43,.08)}

/* ── QUIZ SHELL ── */
.quiz-shell{
  background:#0D1525;
  border:1px solid rgba(99,143,210,.18);
  border-radius:20px;
  padding:36px 32px 32px;
  box-shadow:0 0 0 1px rgba(0,180,255,.04), 0 8px 40px rgba(0,0,0,.35);
  margin:0 auto;
}
@media(max-width:600px){.quiz-shell{padding:24px 18px 22px;border-radius:14px}}
</style>
</head>
<body>
<div class="app" id="root"></div>

<script>
const O=(t,s)=>({t,s});

const ICONS={
  manufactura:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF6B2B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`,

const PROFILES=[

const CAT={perimetro:'Perímetro',acceso:'Control de Acceso',fuerza:'Fuerza de Seguridad',cctv:'CCTV / Alarmas',rrhh:'Recursos Humanos',emergencias:'Emergencias'};

const COMMON=[
  {id:'c1',cat:'perimetro',q:'¿Las instalaciones cuentan con delimitación física claramente definida?',opts:[O('Sí, barda sólida',1),O('Sí, cerca o reja',.67),O('Parcialmente',.33),O('No',0)]},
  {id:'c2',cat:'perimetro',q:'¿Existe iluminación exterior perimetral durante la noche?',opts:[O('Sí, todo el perímetro',1),O('Sí, áreas principales',.6),O('Parcialmente',.3),O('No',0)]},

  {id:'c6',cat:'fuerza',q:'¿Cuenta con personal de seguridad privada asignado?',opts:[O('Sí, 24/7',1),O('Sí, horario parcial',.5),O('No',0)]},
  {id:'c7',cat:'fuerza',q:'¿El personal de seguridad cuenta con capacitación documentada?',opts:[O('Sí',1),O('Parcialmente',.5),O('No',0)]},
  {id:'c8',cat:'cctv',q:'¿La instalación cuenta con sistema de videovigilancia (CCTV)?',opts:[O('Sí, monitoreo en tiempo real',1),O('Sí, solo grabación',.5),O('No',0)]},
  {id:'c9',cat:'cctv',q:'¿Las cámaras cubren accesos y áreas críticas?',opts:[O('Sí, todos',1),O('Parcialmente',.5),O('No',0)]},
  {id:'c10',cat:'cctv',q:'¿Cuenta con sistema de alarma contra intrusión?',opts:[O('Sí, con monitoreo externo',1),O('Sí, solo local',.6),O('No',0)]},

const PQ={
  manufactura:[
    {id:'m1',cat:'acceso',q:'¿Existen zonas de producción con acceso restringido diferenciado?',opts:[O('Sí, control estricto',1),O('Parcialmente',.5),O('No',0)]},

    {id:'m6',cat:'fuerza',q:'¿Las áreas de carga y descarga tienen supervisión de seguridad?',opts:[O('Sí, siempre',1),O('A veces',.5),O('No',0)]},
    {id:'m7',cat:'perimetro',q:'¿Se cuenta con iluminación adecuada en patios y bodegas?',opts:[O('Sí, todas las áreas',1),O('Parcialmente',.5),O('No',0)]},
    {id:'m8',cat:'emergencias',q:'¿Se documentan los incidentes de seguridad ocurridos en planta?',opts:[O('Sí, todos',1),O('Algunos',.5),O('No',0)]},
    {id:'m9',cat:'acceso',q:'¿Existe control de herramientas y equipos de alto valor?',opts:[O('Sí',1),O('Parcialmente',.5),O('No',0)]},
    {id:'m10',cat:'acceso',q:'¿El personal de distintas áreas tiene acceso delimitado por zona?',opts:[O('Sí',1),O('Parcialmente',.5),O('No',0)]},
    {id:'m11',cat:'fuerza',q:'¿Se realizan revisiones de salida al personal operativo?',opts:[O('Sí, siempre',1),O('Ocasionalmente',.5),O('No',0)]},
    {id:'m12',cat:'emergencias',q:'¿Existe protocolo de respuesta ante robo o siniestro en planta?',opts:[O('Sí, documentado',1),O('En proceso',.5),O('No',0)]},

    {id:'m14',cat:'fuerza',q:'¿Los accesos en turnos nocturnos tienen refuerzo de seguridad?',opts:[O('Sí',1),O('Igual que diurno',.5),O('No',0)]},

    {id:'co2',cat:'acceso',q:'¿El acceso a servidores o cuartos de datos está físicamente restringido?',opts:[O('Sí',1),O('Parcialmente',.5),O('No aplica',.8),O('No',0)]},
    {id:'co3',cat:'acceso',q:'¿Se controla el uso de dispositivos externos en equipos corporativos?',opts:[O('Sí',1),O('Parcialmente',.5),O('No',0)]},
    {id:'co4',cat:'acceso',q:'¿Los visitantes son acompañados en todo momento dentro de las instalaciones?',opts:[O('Sí',1),O('Solo en áreas sensibles',.6),O('No',0)]},
    {id:'co5',cat:'acceso',q:'¿El edificio cuenta con lobby o recepción con filtro de acceso?',opts:[O('Sí, con control formal',1),O('Sí, sin control',.4),O('No',0)]},
    {id:'co6',cat:'fuerza',q:'¿Se tiene protocolo ante visitas de alto perfil o situaciones de amenaza?',opts:[O('Sí',1),O('En proceso',.5),O('No',0)]},
    {id:'co7',cat:'perimetro',q:'¿El estacionamiento y accesos vehiculares tienen seguridad?',opts:[O('Sí',1),O('Parcialmente',.5),O('No',0)]},
    {id:'co8',cat:'acceso',q:'¿Las áreas directivas tienen control de acceso diferenciado?',opts:[O('Sí',1),O('Parcialmente',.5),O('No',0)]},
    {id:'co9',cat:'acceso',q:'¿Se realizan auditorías de acceso (quién entró, cuándo, a qué área)?',opts:[O('Sí, regularmente',1),O('Ocasionalmente',.5),O('No',0)]},
    {id:'co10',cat:'emergencias',q:'¿El personal tiene protocolo ante amenaza interna (robo, extorsión)?',opts:[O('Sí',1),O('Parcialmente',.5),O('No',0)]},
    {id:'co11',cat:'emergencias',q:'¿Existe un directorio de contactos de emergencia actualizado?',opts:[O('Sí',1),O('Desactualizado',.4),O('No',0)]},

function calcScores(pid,ans,qs){
  const cats=Object.keys(CAT),cs={};
  cats.forEach(c=>{
    const cqs=qs.filter(q=>q.cat===c);
    cs[c]=cqs.length?Math.round(cqs.reduce((a,q)=>a+(ans[q.id]??0),0)/cqs.length*100):0;
  });
  const ov=Math.round(Object.values(cs).reduce((a,b)=>a+b,0)/cats.length);
  const level=ov>=75?'robusto':ov>=50?'moderado':ov>=25?'elevado':'critico';
  return{overall:ov,cats:cs,level,pid};
}

function heatColor(v){
  if(v>=70)return{bg:'rgba(0,180,100,.18)',color:'#00C878'};
  if(v>=50)return{bg:'rgba(0,212,255,.12)',color:'#00D4FF'};
  if(v>=35)return{bg:'rgba(255,160,30,.14)',color:'#FFA01E'};
  return{bg:'rgba(255,80,80,.16)',color:'#FF5050'};
}
function catColor(v){return v>=70?'#00C878':v>=50?'#00D4FF':v>=35?'#FFA01E':'#FF5050';}

function radarPoint(cx,cy,r,angle,pct){
  const rad=(angle-90)*Math.PI/180,d=r*pct/100;
  return[cx+d*Math.cos(rad),cy+d*Math.sin(rad)];
}
function hexPoints(cx,cy,r,pcts){
  const angles=[0,60,120,180,240,300];
  return angles.map((a,i)=>radarPoint(cx,cy,r,a,pcts[i]));
}
function ptStr(pts){return pts.map(p=>p.map(v=>v.toFixed(1)).join(',')).join(' ');}

      <div class="heat-hdr">
        <div></div>
        ${dims.map(d=>`<div class="heat-hdr-lbl">${d}</div>`).join('')}
      </div>
      ${cats.map(c=>{
        const base=sc.cats[c];
        const vals=[
          Math.min(100,Math.round(base*1.08)),
          base,
          Math.max(0,Math.round(base*0.92)),
        ];
        return`<div class="heat-row">
          <div class="heat-cat">${CAT[c]}</div>
          ${vals.map(v=>{const hc=heatColor(v);return`<div class="heat-cell" style="background:${hc.bg};color:${hc.color}">${v}%</div>`}).join('')}
        </div>`;
      }).join('')}
    </div>

    <!-- BENCHMARK -->
    <div class="card db-full">
      <div class="cardtitle">Comparativo de Industria</div>
      <div class="bmark-legend">
        <div class="bmark-legend-item"><div class="bmark-dot" style="background:var(--cyan)"></div>Tu resultado</div>
        <div class="bmark-legend-item"><div class="bmark-dot" style="background:rgba(255,107,43,.6)"></div>Promedio ${prof.label}</div>
        <div class="bmark-legend-item"><div style="width:8px;height:2px;background:#3A5A8A;border-radius:1px;margin-top:3px"></div>Estándar internacional</div>
      </div>
      ${cats.map(c=>{
        const you=sc.cats[c],ind=bench[c],intl=INTL[c];
        return`<div class="bmark-row">
          <div class="bmark-lbl">${CAT[c]}</div>
          <div class="bmark-track" style="height:6px;background:rgba(255,255,255,.06);border-radius:3px;position:relative;flex:1">
            <div style="height:100%;border-radius:3px;background:var(--cyan);width:${you}%;transition:width 1s ease"></div>
            <div style="position:absolute;top:-4px;left:${ind}%;width:2px;height:14px;background:#FF6B2B;border-radius:1px;opacity:.6"></div>
            <div style="position:absolute;top:-2px;left:${intl}%;width:2px;height:10px;background:#3A5A8A;border-radius:1px"></div>
          </div>
          <div style="display:flex;align-items:center;gap:5px;min-width:100px">
            <span style="font-size:11px;font-weight:700;color:var(--cyan);min-width:28px;text-align:right">${you}%</span>
            <span style="font-size:10px;color:var(--dim)">vs ${ind}% / ${intl}%</span>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- HOJA DE RUTA -->
    <div class="card db-full">
      <div class="cardtitle">Hoja de Ruta Sugerida</div>
      <div class="road-steps">
        ${road.map(r=>`
        <div class="road-step">
          <div class="road-phase" style="color:${r.pcolor}">${r.phase}</div>
          <div class="road-title">${r.title}</div>
          <div class="road-desc">${r.desc}</div>
        </div>`).join('')}
      </div>
      <div class="road-cta">
        <div class="road-cta-text">
          <div class="road-cta-title">${cta.t}</div>
          <div class="road-cta-sub">${cta.d}</div>
        </div>
        <a href="https://integer.mx" target="_blank" style="text-decoration:none">
          <button class="btn">Solicitar diagnóstico completo</button>
        </a>
      </div>
    </div>

  </div>
  <div class="restart-row">
    <button class="btn-ghost" onclick="goScreen('intro')">Reiniciar diagnóstico</button>
  </div>
</div>`;

  // Animate gauge — semicircle: left (π) → clockwise over top → right (2π)
  setTimeout(()=>{
    const score=sc.overall/100;
    const r=80,cx=100,cy=100;
    const startA=Math.PI; // left endpoint
    const endA=startA+score*Math.PI; // progress along the 180° arc
    const x1=cx+r*Math.cos(startA), y1=cy+r*Math.sin(startA); // (20,100)
    const x2=cx+r*Math.cos(endA),   y2=cy+r*Math.sin(endA);
    const large=0; // never exceeds 180°
    const arc=document.getElementById('gauge-arc');
    if(arc)arc.setAttribute('d',`M ${x1.toFixed(1)} ${y1.toFixed(1)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(1)} ${y2.toFixed(1)}`);
  },120);
}

function goScreen(name){
  STATE.screen=name;
  if(name==='intro') STATE={screen:'intro',profile:null,questions:[],qi:0,answers:{}};
  render();
}

function selProfile(id){
  STATE.profile=PROFILES.find(p=>p.id===id);
  STATE.questions=[...COMMON,...PQ[id]];
  STATE.qi=0;STATE.answers={};STATE.screen='quiz';
  render();
}

function answerQ(score){
  const q=STATE.questions[STATE.qi];
  STATE.answers[q.id]=score;
  if(STATE.qi<STATE.questions.length-1){STATE.qi++;render();}
  else{STATE.screen='form';render();}
}

function submitForm(){
  const nombre=document.getElementById('f-nombre').value.trim();
  const apellidos=document.getElementById('f-apellidos').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const lada=document.getElementById('f-lada').value.trim();
  const tel=document.getElementById('f-tel').value.trim();
  const empresa=document.getElementById('f-empresa').value.trim();

  const emailOk=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  const telOk=/^\d{10}$/.test(tel);
  const ladaOk=/^\d{1,3}$/.test(lada);

  document.getElementById('err-email').style.display=(!email||!emailOk)?'block':'none';
  document.getElementById('err-tel').style.display=(!tel||!telOk||!ladaOk)?'block':'none';

  if(!nombre||!apellidos||!email||!emailOk||!tel||!telOk||!lada||!ladaOk||!empresa){
    document.getElementById('form-err').style.display='block';
    return;
  }
  document.getElementById('form-err').style.display='none';
  STATE.lead={nombre,apellidos,email,lada,tel,empresa};
  const sc=calcScores(STATE.profile.id,STATE.answers,STATE.questions);
  buildDashboard(sc);
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack(){
  if(STATE.screen==='form'){STATE.screen='quiz';STATE.qi=STATE.questions.length-1;render();}
  else if(STATE.qi===0){STATE.screen='profile';render();}
  else{STATE.qi--;render();}
}

function render(){
  const{screen,profile,questions,qi}=STATE;
  const root=document.getElementById('root');
  if(screen==='intro'){
    root.innerHTML=`<div id="intro-screen" class="screen">
      <div class="logo"><div class="logo-box">I</div><div class="logo-name">Integer</div></div>
      <div class="eyebrow">Diagnóstico de Seguridad</div>
      <div class="h1">Conoce el nivel de<br>vulnerabilidad de tu <b>operación</b></div>
      <div class="sub">Responde 30 preguntas diseñadas para tu sector y obtén un análisis detallado del estado actual de tu postura de seguridad — sin costo y en minutos.</div>
      <button class="btn" onclick="goScreen('profile')">Iniciar diagnóstico &rarr;</button>
      <div class="meta-row"><span>~5 minutos</span><div class="meta-dot"></div><span>30 preguntas</span><div class="meta-dot"></div><span>Resultados inmediatos</span></div>
    </div>`;
  } else if(screen==='profile'){
    root.innerHTML=`<div id="profile-screen" class="screen">
      <div class="quiz-shell" style="max-width:560px">
        <div class="logo"><div class="logo-box">I</div><div class="logo-name">Integer</div></div>
        <div class="slabel">¿Cuál describe mejor tu organización?</div>
        <div class="pcol">
          ${PROFILES.map(p=>`
          <div class="pcard" onclick="selProfile('${p.id}')">
            <div class="picon">${ICONS[p.id]}</div>
            <div class="pinfo"><div class="plabel">${p.label}</div><div class="pdesc">${p.desc}</div></div>
            <div class="parrow">›</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  } else if(screen==='quiz'){
    const q=questions[qi];
    const pct=Math.round(qi/questions.length*100);
    root.innerHTML=`<div id="quiz-screen" class="screen">
      <div class="quiz-shell" style="max-width:640px">
        <div class="quiz-logo"><div class="logo-box">I</div><div class="logo-name" style="font-size:17px;font-weight:700">Integer</div></div>
        <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div class="qmeta">
          <span class="cat-badge">${CAT[q.cat]}</span>
          <span class="qctr">${qi+1} / ${questions.length}</span>
        </div>
        <div class="qtext">${q.q}</div>
        <div class="opts">
          ${q.opts.map(o=>`<button class="opt" onclick="answerQ(${o.s})">${o.t}</button>`).join('')}
        </div>
        <div class="qnav">
          <button class="btn-ghost" onclick="goBack()">${qi===0?'← Cambiar perfil':'← Anterior'}</button>
        </div>
      </div>
    </div>`;
  } else if(screen==='form'){
    root.innerHTML=`<div id="form-screen" class="screen">
      <div class="quiz-shell" style="max-width:500px">
      <div class="logo"><div class="logo-box">I</div><div class="logo-name">Integer</div></div>
      <div class="eyebrow">Tu diagnóstico está listo</div>
      <div class="form-title">Un último paso para ver tus resultados</div>
      <div class="form-sub">Ingresa tus datos para acceder a tu diagnóstico personalizado. Tu información es confidencial.</div>
      <div class="form-row">
        <div>
          <label class="form-label" for="f-nombre">Nombre <span style="color:#FF6B2B">*</span></label>
          <input class="form-input" id="f-nombre" type="text" placeholder="Juan">
        </div>
        <div>
          <label class="form-label" for="f-apellidos">Apellidos <span style="color:#FF6B2B">*</span></label>
          <input class="form-input" id="f-apellidos" type="text" placeholder="García López">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="f-email">Correo electrónico <span style="color:#FF6B2B">*</span></label>
        <input class="form-input" id="f-email" type="email" placeholder="juan@empresa.com">
        <div id="err-email" style="display:none;color:#FF5050;font-size:11px;margin-top:5px">Ingresa un correo electrónico válido.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Teléfono <span style="color:#FF6B2B">*</span></label>
        <div style="display:flex;gap:8px">
          <select id="f-lada" style="background:#111827;color:#e2e8f0;border:1px solid #1e293b;border-radius:8px;padding:10px 8px;font-size:13px;width:110px;flex-shrink:0;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center">
            <option value="+52">🇲🇽 +52</option>
            <option value="+1">🇺🇸 +1</option>
            <option value="+1">🇨🇦 +1</option>
            <option value="+34">🇪🇸 +34</option>
            <option value="+55">🇧🇷 +55</option>
            <option value="+54">🇦🇷 +54</option>
            <option value="+57">🇨🇴 +57</option>
            <option value="+56">🇨🇱 +56</option>
            <option value="+51">🇵🇪 +51</option>
            <option value="+58">🇻🇪 +58</option>
            <option value="+44">🇬🇧 +44</option>
            <option value="+49">🇩🇪 +49</option>
          </select>
          <input class="form-input" id="f-tel" type="tel" placeholder="8112345678" maxlength="10" style="flex:1">
        </div>
        <div id="err-tel" style="display:none;color:#FF5050;font-size:11px;margin-top:5px">Ingresa un número de 10 dígitos.</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="f-empresa">Empresa <span style="color:#FF6B2B">*</span></label>
        <input class="form-input" id="f-empresa" type="text" placeholder="Nombre de tu empresa">
      </div>
      <div id="form-err" style="display:none;color:#FF5050;font-size:12px;margin-bottom:12px;padding:10px 14px;background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);border-radius:8px">Por favor completa todos los campos requeridos.</div>
      <button class="btn btn-full" onclick="submitForm()">Ver mi diagnóstico &rarr;</button>
      <div style="text-align:center;margin-top:12px">
        <button class="btn-ghost" onclick="goBack()">← Regresar</button>
      </div>
      </div>
    </div>`;
  }
}

render();
</script>
</body>
</html>
